<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — FOTOTERMA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #fefce8 0%, #fef08a 100%); min-height: 100vh; }

        nav {
            background: #1E3A8A;
            padding: 16px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav .logo { font-size: 20px; font-weight: bold; color: white; letter-spacing: 1px; text-decoration: none; }
        nav .links a { text-decoration: none; color: white; font-size: 15px; margin-left: 24px; }
        nav .links a:hover { color: #FDE047; }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 60px);
            padding: 40px 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
        }

        .card h1 { color: #1E3A8A; font-size: 28px; text-align: center; margin-bottom: 8px; }
        .card p { color: #888; text-align: center; margin-bottom: 32px; font-size: 15px; }

        label { font-size: 14px; color: #555; font-weight: bold; display: block; margin-bottom: 6px; }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            margin-bottom: 20px;
            outline: none;
            transition: border 0.2s;
        }
        input:focus { border-color: #1E3A8A; }

        .btn {
            width: 100%;
            padding: 14px;
            background: #F97316;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 4px;
        }
        .btn:hover { background: #ea6c0a; }

        .divider { text-align: center; margin: 20px 0; color: #aaa; font-size: 14px; }

        .link-cadastro {
            text-align: center;
            font-size: 14px;
            color: #555;
            margin-top: 16px;
        }
        .link-cadastro a { color: #1E3A8A; font-weight: bold; text-decoration: none; }
        .link-cadastro a:hover { text-decoration: underline; }

        .perfil-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
        }
        .perfil-tabs button {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            color: #555;
            transition: all 0.2s;
        }
        .perfil-tabs button.ativo {
            border-color: #1E3A8A;
            background: #1E3A8A;
            color: white;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="logo">FOTOTERMA</a>
        <div class="links">
            <a href="/">Home</a>
            <a href="/cadastro">Cadastre-se</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h1>Entrar</h1>
            <p>Acesse a plataforma de análise fotovoltaica</p>

            <div class="perfil-tabs">
                <button class="ativo" onclick="selecionarPerfil(this, 'consultor')">Consultor</button>
                <button onclick="selecionarPerfil(this, 'cliente')">Cliente</button>
            </div>

            {% if erro %}
            <div style="background: #FEE2E2; color: #DC2626; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px;">
                ⚠ {{ erro }}
            </div>
            {% endif %}

            <form action="/login" method="POST">
                <input type="hidden" name="perfil" id="perfil-input" value="consultor">

                <label>E-mail</label>
                <input type="email" name="email" placeholder="Digite seu e-mail" required>

                <label>Senha</label>
                <input type="password" name="senha" placeholder="Digite sua senha" required>

                <button type="submit" class="btn">Entrar</button>
            </form>

            <div class="link-cadastro">
                Não possui conta? <a href="/cadastro">Cadastre-se</a>
            </div>
        </div>
    </div>

    <script>
        function selecionarPerfil(btn, perfil) {
            document.querySelectorAll('.perfil-tabs button').forEach(b => b.classList.remove('ativo'));
            btn.classList.add('ativo');
            document.getElementById('perfil-input').value = perfil;
        }
    </script>

</body>
</html>
