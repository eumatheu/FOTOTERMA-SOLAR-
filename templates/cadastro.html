<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro - FOTOTERMA</title>
</head>

<body style="
    font-family:Arial;
    background:#F8FAFC;
">

    <div style="
        width:400px;
        margin:auto;
        margin-top:60px;
        background:white;
        padding:40px;
        border-radius:20px;
        box-shadow:0 0 20px rgba(0,0,0,0.1);
    ">

        <h1 style="
            text-align:center;
            color:#1E3A8A;
        ">
            Criar Conta
        </h1>

        <p style="
            text-align:center;
        ">
            Cadastre-se para acessar o sistema.
        </p>

        <hr>

        <br>

        <form action="/login">

            <label>
                Nome Completo
            </label>

            <br><br>

            <input
                type="text"
                style="
                    width:100%;
                    padding:12px;
                "
            >

            <br><br>

            <label>
                E-mail
            </label>

            <br><br>

            <input
                type="email"
                style="
                    width:100%;
                    padding:12px;
                "
            >

            <br><br>

            <label>
                Senha
            </label>

            <br><br>

            <input
                type="password"
                style="
                    width:100%;
                    padding:12px;
                "
            >

            <br><br>

            <label>
                Confirmar Senha
            </label>

            <br><br>

            <input
                type="password"
                style="
                    width:100%;
                    padding:12px;
                "
            >

            <br><br>

            <button style="
                width:100%;
                background:#1E3A8A;
                color:white;
                border:none;
                padding:15px;
                border-radius:10px;
                cursor:pointer;
                font-size:16px;
            ">
                Criar Conta
            </button>

        </form>

        <br>

        <p style="
            text-align:center;
        ">
            Já possui uma conta?
            <a href="/login">
                Entrar
            </a>
        </p>

    </div>

</body>

</html>
